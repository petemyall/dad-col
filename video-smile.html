<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Tribute</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .video-background {
            background-image: url('media/video-smile-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
        }

        .video-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 10vh auto 0;
            padding-bottom: 56.25%; /* 16:9 ratio */
            position: relative;
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="video-background">

    <div class="video-wrapper">
        <iframe
            id="tributeVideo"
            src="https://www.youtube.com/embed/J5xeUlUuf-0?enablejsapi=1"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <br>
    <a href="index.html?nofade=true" class="home-btn">Back To Main Page</a>

</div>

<!-- Load YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
    let player;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('tributeVideo', {
            events: {
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerStateChange(event) {
        // 0 = video ended
        if (event.data === 0) {
            setTimeout(function () {
                window.location.href = "index.html?nofade=true";
            }, 3000); // 3000ms = 3 seconds
        }
    }
</script>

</body>
</html>
